name: 🚀 Deploy to Pegaso Production

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Build & Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      
    - name: ⚙️ Setup Node.js (Para Next.js)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: 🛠️ Compilar Booking Engine (Next.js)
      run: |
        cd booking-engine
        npm install
        npm run build
        cd ..
        # Movemos la carpeta compilada "out" a una carpeta llamada "portal" para subirla
        mv booking-engine/out ./portal

    - name: 📂 Sync files to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        protocol: ftps
        server-dir: public_html/
        # Excluimos el código fuente de Next.js, solo subimos la versión compilada en "portal"
        exclude: |
          **/.git*
          **/.git*/**
          **/.github*/**
          README.md
          .gitignore
          booking-engine/**
          knowledge/**