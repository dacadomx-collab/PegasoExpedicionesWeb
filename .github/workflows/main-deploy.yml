name: 🚀 Deploy to Pegaso Production

on:
  push:
    branches:
      - main # Solo se ejecuta cuando mandas cambios a la rama main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 📂 Sync files to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        protocol: ftps # Usamos FTPS explícito como solicitaste para mayor seguridad
        exclude: |
          **/.git*
          **/.git*/**
          **/.github*/**
          README.md
          .gitignore